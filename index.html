<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ICT Adventure Quiz with Check Button! 🌟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #ff9a9e);
            padding: 20px; 
            min-height: 100vh;
        }
        .container { 
            max-width: 950px; margin: auto; 
            background: rgba(255,255,255,0.95); 
            border-radius: 30px; 
            padding: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { color: #ff6b9d; font-size: 2.2em; margin-bottom: 10px; }
        #totalScore { 
            font-size: 1.8em; 
            color: #28a745; 
            background: #d4edda; 
            padding: 15px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            font-weight: bold;
        }
        .section-title { 
            background: linear-gradient(45deg, #ff6b9d, #ffd93d); 
            color: white; 
            padding: 18px; 
            border-radius: 25px; 
            margin: 25px 0; 
            font-size: 1.8em; 
        }
        .question-card { 
            background: linear-gradient(135deg, #fff, #f0f8ff); 
            padding: 25px; 
            border-radius: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #ffd93d;
            position: relative;
        }
        .question-text {
            font-size: 1.5em; 
            margin-bottom: 18px; 
            color: #333;
        }
        .option { 
            display: block; 
            margin: 12px 0; 
            font-size: 1.4em; 
            padding: 18px; 
            background: #fff; 
            border: 3px solid #ff9a9e; 
            border-radius: 18px; 
            cursor: pointer; 
            transition: all 0.3s;
            user-select: none;
        }
        .option:hover:not(.checked) { 
            background: #ff9a9e; 
            color: white; 
            border-color: #ff6b9d;
        }
        input[type="radio"] { 
            margin-left: 10px; 
            transform: scale(1.4); 
            cursor: pointer;
        }
        .correct { 
            background: linear-gradient(45deg, #d4edda, #c3e6cb) !important; 
            border-color: #28a745 !important; 
            color: #155724 !important;
            animation: pulse 0.6s ease;
        }
        .wrong { 
            background: linear-gradient(45deg, #f8d7da, #f5c6cb) !important; 
            border-color: #dc3545 !important; 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .check-btn {
            background: linear-gradient(45deg, #28a745, #20c997); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 20px; 
            font-size: 1.2em; 
            cursor: pointer; 
            margin: 15px auto 0; 
            display: block;
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
            transition: transform 0.2s;
        }
        .check-btn:hover { transform: scale(1.05); }
        .check-btn:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none;
        }
        .score-display {
            font-size: 1.8em; 
            color: #ffd93d; 
            font-weight: bold; 
            margin-top: 10px;
        }
        .final-btn {
            background: linear-gradient(45deg, #ff6b9d, #ffd93d); 
            color: white; 
            border: none; 
            padding: 25px 50px; 
            border-radius: 30px; 
            font-size: 1.8em; 
            cursor: pointer; 
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(255,107,157,0.4);
        }
        .final-btn:hover { transform: scale(1.05); }
        #finalResult { font-size: 2.5em; color: #ff6b9d; margin-top: 25px; }
        .encouragement { font-size: 1.8em; color: #28a745; margin-top: 15px; font-weight: bold; }
        @media (max-width: 768px) {
            h1 { font-size: 2.2em; }
            .question-text { font-size: 1.3em; }
            input[type="radio"] { transform: scale(1.8); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ICT March Revision _PriMary (5) _2026  🌟<br> <span style="
  color: #FFD700; /* ذهبي لامع */
  background: linear-gradient(45deg, #8A2BE2, #FF69B4, #FFD700); 
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-family: 'Fredoka One', sans-serif; /* خط أطفال مرح */
  font-size: 28px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  padding: 8px 12px;
  border-radius: 20px;
  border: 2px solid #FFD700;
  display: inline-block;
">
🌟🚀 By Mrs. Amina Galal TI. 01066154514 🌟🚀
</span>

</h1>
        <div id="totalScore">Total Score: <span id="currentTotal">0</span> / <span id="maxScore">0</span> points</div>
        
        <div class="section-title">⭐ Section 1: True or False?</div>
        <div id="quiz1"></div>
        
        <div class="section-title">🎯 Section 2: Multiple Choice!</div>
        <div id="quiz2"></div>
        
        <button class="final-btn" onclick="showFinalResult()" id="finalBtn" style="display:none;">🏆 Show Final Super Score!</button>
        <h2 id="finalResult"></h2>
        <div id="encouragement"></div>
    </div>

    <script>
        // Exact data from file [file:13]
        const tf = [
            "Protection from piracy on the internet is from Digital Citizenship rights.",
            "The Internet is used to improve health care provided to citizens.",
            "The Egyptian Knowledge Bank provides many free various educational materials.",
            "Digital citizenship means using the internet irresponsibly.",
            "The internet can be a tool for spreading awareness.",
            "The Egyptian Knowledge Bank is considered from the reliable online websites.",
            "Microsoft Edge enables you to create databases.",
            "Microsoft Edge is the web browser that comes with Microsoft Windows.",
            "Instant chat rooms are asynchronous communication tools.",
            "A good website is characterized by begin organized, easy to use and its design attractive.",
            "The information should be verified before use.",
            "Good design makes the website easier to use.",
            "The Library of Alex website is a reliable sources.",
            "Information websites are used for entertainment purpose only.",
            "Good design makes the website easier to use.",
            "The Library of Alex website is a reliable sources.",
            "Information websites are used for entertainment purpose only.",
            "Online advertisement are always true.",
            "Educationl websites are non- commercial.",
            "Groups cannot be created within browser.",
            "You can use a Microsoft Edge browser on the windows operating system.",
            "A web browser is a program or application that help you browse in websites.",
            "Example of web browsers is google Chrome.",
            "Anyone can create a simple websites by himself.",
            "commercial services are intended for awareness- raising purpose.",
            "personal information must be known during the purchase process.",
            "Online advertisement are always true.",
            "Safe shopping means begin wary of unreliable websites.",
            "Online shopping can be risky if we dont practice safe shopping.",
            "Educationl websites are non- commercial.",
            "You can use a Microsoft Edge browser on the windows operating system.",
            "Features of the Microsoft Edge browser are security and privacy.",
            "New pages can be added to a group in Microsoft Edge.",
            "Educational websites and digital libraries are reliable sources.",
            "Any website can be trusted without verification.",
            "A good source mention the writer of content.",
            "Comparing sources helps ensure accuracy.",
            "The source mentioned in your project is one form of respecting the rights of others.",
            "The publication date should be ignored."
        ];
        const tfAnswers = [true,true,true,false,true,true,false,true,false,true,true,true,true,false,true,true,false,false,true,false,true,true,true,true,false,true,false,true,true,true,true,true,true,true,false,true,true,true,false];

        const mcq = [
            {q: "Some common online misconception are", o: ["Mocking others","Disrespect for rules","posting photos without permission","All the previous"], a: 3},
            {q: "programs is used to create websites", o: ["Excel","Word","WordPress","Paint"], a: 2},
            {q: "Examples of commercial websites", o: ["Amazon","Wikipedia","knowledge bank","YouTube"], a: 0},
            {q: "It must be ensured that the site", o: ["Reliable sources","No content","unknown","nothing from the pervious"], a: 0},
            {q: "Safe shopping means", o: ["Use trusted websites","providing data","Opening strange links","Account posting"], a: 0},
            {q: "A good source should contain", o: ["The authors name","numbers","Just a lot of pictures","advertisements"], a: 0},
            {q: "Methods of verifying information", o: ["Comparing more than one site","Read only one title","Ignore the sources","Copying texts without reviewing them"], a: 0}
        ];

        let totalScore = 0;
        let checkedQuestions = 0;
        const totalQuestions = tf.length + mcq.length;

        // Generate questions with check buttons
        const quiz1 = document.getElementById('quiz1');
        tf.forEach((q, i) => {
            const cardId = `tf-${i}`;
            quiz1.innerHTML += `
                <div class="question-card" id="${cardId}">
                    <div class="question-text">Q${i+1}: ${q} ⭐ <span>(2 points)</span></div>
                    <label class="option"><input type="radio" name="tf${i}" value="true"> 😊 True</label>
                    <label class="option"><input type="radio" name="tf${i}" value="false"> 😕 False</label>
                    <button class="check-btn" onclick="checkAnswer('tf', ${i}, ${tfAnswers[i]})">✅ Check Answer!</button>
                    <div class="score-display" id="score-${cardId}" style="display:none;"></div>
                </div>`;
        });

        const quiz2 = document.getElementById('quiz2');
        mcq.forEach((item, i) => {
            const cardId = `mc-${i}`;
            quiz2.innerHTML += `
                <div class="question-card" id="${cardId}">
                    <div class="question-text">Q${tf.length + i + 1}: ${item.q} 🎯 <span>(2 points)</span></div>
                    ${item.o.map((opt, idx) => `<label class="option"><input type="radio" name="mc${i}" value="${idx}"> ${opt}</label>`).join('')}
                    <button class="check-btn" onclick="checkAnswer('mc', ${i}, ${item.a})">✅ Check Answer!</button>
                    <div class="score-display" id="score-${cardId}" style="display:none;"></div>
                </div>`;
        });

        document.getElementById('maxScore').textContent = totalQuestions * 2;
        updateTotalScore();

        function checkAnswer(type, index, correctVal) {
            const name = `${type}${index}`;
            const selected = document.querySelector(`input[name="${name}"]:checked`);
            const card = document.getElementById(`${type}-${index}`);
            const scoreDiv = document.getElementById(`score-${type}-${index}`);
            
            if (!selected) {
                alert('⚠️ Please pick an answer first! 😊');
                return;
            }

            const isCorrect = (type === 'tf' ? selected.value === (correctVal ? 'true' : 'false') : parseInt(selected.value) === correctVal);
            
            // Highlight
            const allOptions = card.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('correct', 'wrong'));
            
            if (isCorrect) {
                selected.parentElement.classList.add('correct');
                totalScore += 2;
                scoreDiv.innerHTML = '✨ +2 points! Great job! ✨';
                scoreDiv.style.color = '#ffd93d';
                // Success sound
                new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcD').play().catch(() => {});
            } else {
                selected.parentElement.classList.add('wrong');
                // Show correct one
                const correctInput = Array.from(card.querySelectorAll('input[type="radio"]')).find(input => 
                    type === 'tf' ? input.value === (correctVal ? 'true' : 'false') : parseInt(input.value) === correctVal
                );
                correctInput.parentElement.classList.add('correct');
                scoreDiv.innerHTML = '💪 Keep trying! Correct answer highlighted.';
                scoreDiv.style.color = '#ff6b9d';
            }
            
            scoreDiv.style.display = 'block';
            checkedQuestions++;
            card.querySelector('.check-btn').disabled = true;
            card.querySelector('.check-btn').textContent = '✅ Checked!';
            
            updateTotalScore();
            
            if (checkedQuestions === totalQuestions) {
                document.getElementById('finalBtn').style.display = 'inline-block';
            }
        }

        function updateTotalScore() {
            document.getElementById('currentTotal').textContent = totalScore;
        }

        function showFinalResult() {
            const percentage = Math.round((totalScore / (totalQuestions * 2)) * 100);
            document.getElementById('finalResult').innerText = `Final Score: ${totalScore}/${totalQuestions * 2} (${percentage}%) 🏆`;
            
            let msg = '';
            if (percentage >= 90) msg = "🎉 ICT Superhero Champion! You're amazing! 🌟";
            else if (percentage >= 80) msg = "⭐⭐ Fantastic! You're a quiz star! Keep going!";
            else if (percentage >= 70) msg = "💪 Great job! Super proud of you!";
            else if (percentage >= 60) msg = "🎈 Well done! You're learning fast!";
            else if (percentage >= 50) msg = "😊 Good effort! Practice makes perfect!";
            else msg = "❤️ Every hero starts here! Try again & win!";
            
            document.getElementById('encouragement').innerText = msg;
        }
    </script>
</body>
</html>
